[repository]
name = "Hypr-ComputerUse-MCP"
authors = ["wilf"]
commit_pins = [
    ["0.54.3", ""]
]

[hyprcum]
description = "Background Computer Use primitives for Hyprland"
authors = ["wilf"]
output = "build-hyprpm/libhyprcum.so"
build = [
    "cmake -S . -B build-hyprpm -DCMAKE_BUILD_TYPE=Release",
    "cmake --build build-hyprpm",
    "ctest --test-dir build-hyprpm --output-on-failure"
]
